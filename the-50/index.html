  <style>
    :root {
      --bg:        #000000;
      --bg-card:   #0a0a0a;
      --white:     #ffffff;
      --grey-hi:   #999999;
      --grey-mid:  #555555;
      --grey-lo:   #222222;
      --rule:      rgba(255,255,255,0.08);
      --rule-hover:rgba(255,255,255,0.3);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom, 24px);
      overflow-x: hidden;
    }

    /* subtle grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }

    /* ── HEADER ── */
    header {
      padding: 56px 0 48px;
      border-bottom: 1px solid var(--rule);
    }

    .heirwave-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }

    .heirwave-wrap svg {
      width: 52px;
      height: 28px;
      color: var(--white);
      flex-shrink: 0;
    }

    .site-name {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--grey-hi);
    }

    .list-title {
      font-family: 'Anton', sans-serif;
      font-size: clamp(64px, 14vw, 108px);
      line-height: 0.9;
      letter-spacing: -0.02em;
      color: var(--white);
      margin-bottom: 20px;
    }

    .list-title span {
      color: var(--grey-hi);
    }

    .tagline {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 15px;
      color: var(--grey-hi);
      line-height: 1.5;
      max-width: 420px;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 20px;
    }

    .meta-badge {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--white);
      border: 1px solid var(--grey-mid);
      padding: 4px 10px;
    }

    .meta-count {
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--grey-mid);
    }

    /* ── LIST ── */
    .list-section {
      padding: 16px 0 48px;
    }

    .list-item {
      display: grid;
      grid-template-columns: 52px 1fr;
      gap: 0 20px;
      align-items: baseline;
      border-bottom: 1px solid var(--rule);
      transition: border-color 0.2s ease;
      opacity: 0;
      transform: translateY(8px);
      animation: fadeUp 0.4s ease forwards;
    }

    .list-item:hover {
      border-bottom-color: var(--rule-hover);
    }

    .list-item a {
      display: block;
      padding: 18px 0 17px;
      color: var(--white);
      text-decoration: none;
      font-family: 'Anton', sans-serif;
      font-size: clamp(18px, 4.5vw, 26px);
      letter-spacing: 0.01em;
      line-height: 1;
      transition: color 0.15s ease;
    }

    .list-item:hover a {
      color: var(--grey-hi);
    }

    .list-num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--grey-lo);
      letter-spacing: 0.05em;
      padding-top: 20px;
      text-align: right;
      transition: color 0.15s ease;
      user-select: none;
    }

    .list-item:hover .list-num {
      color: var(--grey-mid);
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── ARCHIVE ── */
    .archive-section {
      border-top: 1px solid var(--rule);
      padding: 40px 0 64px;
    }

    .archive-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      padding: 8px 0;
      user-select: none;
      background: none;
      border: none;
      width: 100%;
      color: inherit;
    }

    .archive-toggle-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .archive-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--grey-hi);
    }

    .archive-count-badge {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--grey-mid);
      font-family: 'IBM Plex Mono', monospace;
    }

    .archive-chevron {
      color: var(--grey-mid);
      font-size: 12px;
      transition: transform 0.3s ease;
    }

    .archive-chevron.open { transform: rotate(180deg); }

    .archive-list {
      display: none;
      padding-top: 8px;
    }

    .archive-list.open { display: block; }

    .archive-list .list-item {
      opacity: 1;
      transform: none;
      animation: none;
    }

    .archive-list .list-item a {
      font-size: clamp(15px, 3.5vw, 20px);
      color: var(--grey-mid);
    }

    .archive-list .list-item:hover a { color: var(--white); }

    .archive-list .list-num { color: #1a1a1a; }
    .archive-list .list-item:hover .list-num { color: var(--grey-mid); }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--rule);
      padding: 28px 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-left {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--grey-mid);
    }

    .footer-right {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 12px;
      color: var(--grey-mid);
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--grey-lo); }

    @media (max-width: 480px) {
      header { padding: 40px 0 36px; }
      .list-item { grid-template-columns: 36px 1fr; gap: 0 12px; }
      .list-num { text-align: left; }
    }
  </style>
</head>

    { name: "Moises AI",              url: "https://moises.ai/" },
    { name: "Ashley B",               url: "https://www.instagram.com/ashleytheebarroness" },
    { name: "Dave Hunter",            url: "https://www.instagram.com/__davehunter" },

  // Items beyond index 49 auto-archive. Add new items to LIST above, not here.
  const ARCHIVE = [];

  // ─── RENDER ────────────────────────────────────────────────────────────
  const CAP     = 50;
  const active  = LIST.slice(0, CAP);
  const overflow = [...LIST.slice(CAP), ...ARCHIVE];

  function buildItem(item, index, isArchive) {
    const el = document.createElement('div');
    el.className = 'list-item';
    if (!isArchive) {
      el.style.animationDelay = `${Math.min(index * 16, 560)}ms`;
    } else {
      el.style.opacity = '1';
      el.style.transform = 'none';
      el.style.animation = 'none';
    }
    el.innerHTML = `
      <span class="list-num">${String(index + 1).padStart(2, '0')}</span>
      <a href="${item.url}" target="_blank" rel="noopener noreferrer">${item.name}</a>
    `;
    return el;
  }

  const mainEl = document.getElementById('main-list');
  active.forEach((item, i) => mainEl.appendChild(buildItem(item, i, false)));
  document.getElementById('live-count').textContent = `${active.length} entries`;

  if (overflow.length > 0) {
    document.getElementById('archive-section').style.display = 'block';
    document.getElementById('archive-count').textContent = overflow.length;
    const archiveListEl = document.getElementById('archive-list');
    overflow.forEach((item, i) => archiveListEl.appendChild(buildItem(item, i, true)));

    const toggleBtn   = document.getElementById('archive-toggle');
    const archiveList = document.getElementById('archive-list');
    const chevron     = document.getElementById('archive-chevron');

    toggleBtn.addEventListener('click', () => {
      const isOpen = archiveList.classList.toggle('open');
      chevron.classList.toggle('open', isOpen);
      toggleBtn.setAttribute('aria-expanded', String(isOpen));
    });
  }

<!-- ── MUSA 50 · ENHANCER ───────────────────────────────────────────────────
     Reads lanes + alumni from the canon (musa-50.json) at load, then:
       • drops a subtle lane tag beside each entry (matched by URL)
       • renders a "ROTATED OFF" strip below the 50 when alumni is non-empty
     Fully defensive — any failure leaves the page exactly as-is. Nothing to
     maintain: it derives everything from the live canon, so it stays in sync
     with every future swap automatically.
─────────────────────────────────────────────────────────────────────────── -->
<style>
  .lane-tag{
    display:inline-block; vertical-align:middle; transform:translateY(-2px);
    margin-left:12px; padding:2px 6px; line-height:1;
    font-family:'IBM Plex Mono',monospace; font-size:9px; font-weight:500;
    letter-spacing:0.12em; text-transform:lowercase;
    color:#cdbf99; border:1px solid #3a3526; border-radius:3px;
    white-space:nowrap; user-select:none;
  }
  @media (max-width:480px){ .lane-tag{ margin-left:8px; } }
  .rotated-section{ border-top:1px solid var(--rule); padding:40px 0 8px; }
  .rotated-head{
    font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:500;
    letter-spacing:0.22em; text-transform:uppercase; color:var(--grey-hi);
    display:flex; align-items:center; gap:12px; margin-bottom:4px;
  }
  .rotated-head .rc{ color:var(--grey-mid); letter-spacing:0.1em; }
  .rotated-sub{
    font-family:'Fraunces',serif; font-style:italic; font-size:12px;
    color:var(--grey-mid); margin-bottom:20px;
  }
  .rotated-item{
    display:grid; grid-template-columns:1fr auto; gap:0 16px; align-items:baseline;
    padding:12px 0; border-bottom:1px solid var(--rule);
  }
  .rotated-item a, .rotated-item span.nm{
    font-family:'Anton',sans-serif; font-size:clamp(15px,3.5vw,20px);
    color:var(--grey-mid); text-decoration:none; letter-spacing:0.01em;
  }
  .rotated-item a:hover{ color:var(--white); }
  .rotated-meta{
    font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:0.1em;
    color:var(--grey-lo); text-align:right; white-space:nowrap; padding-left:12px;
  }
</style>
<script>
(function(){
  var CONFIG = {
    canonURL: "https://raw.githubusercontent.com/NightvisionStudios/musa-cultural-os/main/musa-50.json",
    listSelector: "#main-list .list-item a, #archive-list .list-item a"
  };
  function norm(u){
    try{ var x=new URL(u); return (x.hostname.replace(/^www\./,"")+x.pathname.replace(/\/$/,"")).toLowerCase(); }
    catch(e){ return String(u||"").replace(/\/$/,"").toLowerCase(); }
  }
  function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
  try{
    fetch(CONFIG.canonURL + "?v=" + Date.now())
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(data){
        if(!data) return;
        var laneByUrl = {};
        (data.entries||[]).forEach(function(e){ if(e && e.url && e.lane) laneByUrl[norm(e.url)] = e.lane; });
        document.querySelectorAll(CONFIG.listSelector).forEach(function(a){
          if(a.querySelector(".lane-tag")) return;
          var lane = laneByUrl[norm(a.getAttribute("href"))];
          if(!lane) return;
          var tag = document.createElement("span");
          tag.className = "lane-tag";
          tag.textContent = lane;
          a.appendChild(tag);
        });
        var alu = (data.alumni||[]).slice();
        if(alu.length){
          alu.sort(function(a,b){ return String(b.tenure_out||"").localeCompare(String(a.tenure_out||"")); });
          var wrap = document.querySelector(".wrap");
          if(!wrap) return;
          var foot = wrap.querySelector("footer");
          var sec = document.createElement("section");
          sec.className = "rotated-section";
          var rows = alu.map(function(a){
            var nm = a.url
              ? '<a href="'+esc(a.url)+'" target="_blank" rel="noopener noreferrer">'+esc(a.name)+'</a>'
              : '<span class="nm">'+esc(a.name)+'</span>';
            var meta = esc(a.lane||"") + (a.tenure_out ? (" \u00b7 "+esc(a.tenure_out)) : "");
            return '<div class="rotated-item">'+nm+'<span class="rotated-meta">'+meta+'</span></div>';
          }).join("");
          sec.innerHTML =
            '<div class="rotated-head">ROTATED OFF <span class="rc">'+alu.length+'</span></div>'+
            '<div class="rotated-sub">The 50 keeps a record \u2014 names that rotated off. The gate remembers.</div>'+
            rows;
          if(foot) wrap.insertBefore(sec, foot); else wrap.appendChild(sec);
        }
      })
      .catch(function(){});
  }catch(e){}
})();
</script>

</body>
</html>
